<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | NexgenFlows Ingeniería</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0d2230;
      --bg-alt: #12374c;
      --text: #e8f6fc;
      --muted: #b7d7e3;
      --accent: #f68f2b;
      --line: rgba(232, 246, 252, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Sora", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(246, 143, 43, 0.22), transparent 32%),
        radial-gradient(circle at 86% 82%, rgba(0, 150, 190, 0.22), transparent 34%),
        linear-gradient(155deg, var(--bg) 0%, var(--bg-alt) 100%);
      padding: 1.2rem;
    }

    main {
      width: min(640px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(13, 34, 48, 0.68);
      backdrop-filter: blur(6px);
      padding: 2rem;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.24);
    }

    h1 {
      margin: 0 0 0.9rem;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      line-height: 1.08;
    }

    p {
      margin: 0 0 1.1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.75rem 1.1rem;
      background: linear-gradient(120deg, #007a96, #0d3f53);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    small {
      display: block;
      margin-top: 0.85rem;
      color: var(--muted);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main>
    <h1>Esta página no existe o fue movida.</h1>
    <p>La dirección que abriste no está disponible. Puedes volver al inicio y continuar navegando por los servicios y productos de NexgenFlows Ingeniería.</p>
    <a href="/">Volver al inicio</a>
    <small>Error 404</small>
  </main>
</body>
</html>
